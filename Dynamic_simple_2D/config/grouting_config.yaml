# 多物理场注浆模拟配置文件 - 简化两场系统 [位移, 压力]
# 坐标系：竖直向上为正，重力加速度 9.81 m/s² 方向向下

simulation:
  total_time: 120.0              # 总模拟时间 (秒
  dt_initial: 0.1                 # 初始时间步长 (秒)
  dt_min: 0.05                    # 最小时间步长 (秒)
  dt_max: 0.5                  # 最大时间步长 (秒)
  save_frequency: 10              # 结果保存频率（每 N 步）
  max_steps: 10000                # 最大时间步数
  tolerance: 1e-6                 # 全局收敛容差
  max_consecutive_failures: 5     # 最大连续求解失败次数
  adaptive_strategy: "basic"      # 自适应时间步策略 ("fixed" 或 "basic")
  time_integration_method: "backward_euler"  # 时间积分方法

materials:
  soil:
    E: 20e6                        # 杨氏模量 (Pa)
    nu: 0.3                         # 泊松比
    phi0: 0.4                       # 初始孔隙度
    k0: 1e-12                       # 初始渗透率 (m²)
    biot_coefficient: 1.0            # Biot 系数
    rho_s: 2700.0                    # 土颗粒密度 (kg/m³)
  grout:
    rho_g: 1800.0                    # 浆液密度 (kg/m³)
    mu_g0: 1e-2                      # 浆液初始粘度 (Pa·s)
    xi: 1.56                         # 粘度增长常数 (1/min)
    filtration_coeff: 0.75           # 过滤系数
    pressure: 420e3                  # 最大注浆压力 (Pa)
    duration: 7200.0                 # 注浆持续时间 (秒)
    rise_time: 120.0                 # 压力上升时间 (秒)
    pressure_mode: "linear_increase" # 压力演化模式 ("linear_increase", "pulse", "constant")
  water:
    rho_w: 1000.0                    # 水密度 (kg/m³)
    mu_w: 1e-3                        # 水粘度 (Pa·s)

geometry:
  height: 13.0                       # 地基高度 (m)
  depth: 10.0                         # 钻孔深度 (m)
  drill_radius: 0.05                  # 钻孔半径 (m)

solver:
  type: "newton"                      # 求解器类型
  max_iterations: 5                   # 非线性最大迭代次数
  relative_tolerance: 1e-12            # 相对容差
  absolute_tolerance: 1e-4            # 绝对容差
  linear_solver: "mumps"               # 线性求解器 ("mumps", "gmres", "cg")
  preconditioner: "lu"               # 预条件子（当 linear_solver 为 "gmres" 时使用）
  report_convergence: true             # 是否输出详细收敛信息

output:
  format: "xdmf"                       # 输出格式
  fields:
    - "displacement"
    - "pressure"                       # 只输出位移和压力
  write_frequency: 10                   # 写入频率（每 N 步）
  monitor_frequency: 100                 # 监控信息输出频率（每 N 步）

grouting_termination:
  holding_time: 1200.0                  # 屏浆目标时间 (秒)，20分钟
  injection_rate_threshold: 2.0          # 进入屏浆的注入率阈值 (L/min)
  holding_rate_threshold: 2.0            # 屏浆完成平均注入率阈值 (L/min)