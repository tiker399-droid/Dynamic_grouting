# 多物理场注浆模拟配置文件 - 简化两场系统 [位移, 压力]
# 坐标系：竖直向上为正，重力加速度 9.81 m/s² 方向向下
 
simulation:
  total_time: 1.0
  dt_initial: 0.1
  dt_min: 0.01
  dt_max: 1.0
  save_frequency: 10
  max_steps: 10000
  tolerance: 1e-6
  max_consecutive_failures: 5
  adaptive_strategy: "basic"
  time_integration_method: "backward_euler"
 
materials:
  soil:
    E: 20e6                        # 杨氏模量 (Pa)
    nu: 0.3                        # 泊松比
    phi0: 0.4                      # 初始孔隙度
    k0: 1e-12                      # 初始渗透率 (m²)
    biot_coefficient: 1.0          # Biot 系数 α
    rho_s: 2700.0                  # 土颗粒密度 (kg/m³)
 
    # -----------------------------------------------------------------------
    # 【修正】存储系数 S = 1/M（Biot 模量倒数）
    #
    # 物理推导（饱和土，α≈1，石英颗粒 Ks=36GPa，水 Kf=2.2GPa）：
    #   S = (α-φ)/Ks + φ/Kf = 0.6/3.6e10 + 0.4/2.2e9 ≈ 2.0e-10 /Pa
    #
    # 注意：单独使用此正确值会导致顺序耦合（排水分裂）数值爆炸（10^32 量级），
    # 因为排水分裂稳定条件要求 S > α²/K_dr ≈ 5.2e-8，而 2e-10 << 5.2e-8。
    # 本代码已实现 FSS（固定应力分裂）稳定化，自动补偿，此值可安全使用。
    # -----------------------------------------------------------------------
    storage_coefficient: 2.0e-10   # /Pa，物理正确值（水压缩性主导）
 
  grout:
    rho_g: 1800.0                  # 浆液密度 (kg/m³)
    mu_g0: 1e-2                    # 浆液初始粘度 (Pa·s)
    xi: 1.56                       # 粘度增长常数 (1/min)
    filtration_coeff: 0.75
    pressure: 420e3                # 最大注浆压力 (Pa)
    duration: 7200.0               # 注浆持续时间 (秒)
    rise_time: 60.0               # 压力上升时间 (秒)
    pressure_mode: "linear_increase"
  
  water:
    rho_w: 1000.0
    mu_w: 1e-3
  
geometry:
  height: 13.0
  depth: 10.0
  drill_radius: 0.05
 
solver:
  type: "newton"
  max_iterations: 5
  relative_tolerance: 1e-12
  absolute_tolerance: 1e-4
  linear_solver: "mumps"
  preconditioner: "lu"
  report_convergence: true
 
  # -----------------------------------------------------------------------
  # 【FSS 内迭代】固定应力分裂稳定化内迭代次数
  #
  # 原理：FSS 每次内迭代误差缩减率 ρ = S·K_dr/(S·K_dr + α²) ≈ 1.9e-3
  #       3 次迭代后误差 < 7e-9（机器精度）
  #       → 收敛到与全隐式耦合完全等价的精确解
  #
  # 推荐值：
  #   fss_inner_iterations: 3   - 标准，压力场与位移场充分耦合（推荐）
  #   fss_inner_iterations: 1   - 最快，仅单次 FSS 近似（适合快速测试）
  #   fss_inner_iterations: 5   - 保守，超高精度（通常无必要）
  # -----------------------------------------------------------------------
  fss_inner_iterations: 3
 
output:
  format: "xdmf"
  fields:
    - "displacement"
    - "pressure"
  write_frequency: 1
  monitor_frequency: 100
 
grouting_termination:
  holding_time: 1200.0
  injection_rate_threshold: 2.0
  holding_rate_threshold: 2.0